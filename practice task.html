<html>

<head>
    
    <title>Formatted Lists</title>
</head>
<body>

    <h3>Unordered List</h3>
    <ul>
        <li>data 1</li>
        <li>data 2</li>
        <li>data 3</li>
    </ul>

    <h3>Ordered List</h3>
    <ol>
        <li>data 1</li>
        <li>data 2</li>
        <li>data 3</li>
    </ol>

   
    <h3>Description List</h3>
    <dl>
        <dt>coffee</dt>
        <dd><sub>black hot drink</sub></dd>
        
        <dt>milk</dt>
        <dd><sub>white cold drink</sub></dd>
    </dl>

</body>
</html>
