<html>

<head>

    <title>Lists in Table</title>

</head>

<body>

    <table>
        <tr>

            <td>
                <h3>Unordered List</h3>
                <ul>
                    <li>data 1</li>
                    <li>data 2</li>
                    <li>data 3</li>
                </ul>
            </td>

            <td>
                <h3>Ordered List</h3>
                <ol>
                    <li>data 1</li>
                    <li>data 2</li>
                    <li>data 3</li>
                </ol>
            </td>

            <td>
                <h3>Description List</h3>
                <dl>
                    <dt>coffee</dt>
                    <dd><sub>black hot drink</sub></dd>

                    <dt>milk</dt>
                    <dd><sub>white cold drink</sub></dd>
                </dl>
            </td>

        </tr>
    </table>

</body>

</html>
